name: Valparaíso

concurrency:
  group: valparaisodegoias
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - workflows_config

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max_old_space_size=4096"

      SKIP_PREFLIGHT_CHECK: "true"
      CI: "false"
      GENERATE_SOURCEMAP: "false"
      NEXT_PUBLIC_API_URL: "http://209.126.1.173"
      NEXT_PUBLIC_SITE_URL: "https://materiavalparaisodegoias.virtualis.ia.br"
      NEXT_PUBLIC_BUILD_MODE: "static"
      NEXT_PUBLIC_ENABLE_AI: "true"
      NEXT_PUBLIC_ENABLE_TRANSCRIPTION: "true"
      NEXT_PUBLIC_ENABLE_ADMIN: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalando dependências
        run: npm ci

      - name: (debug) Versões e dependências
        run: |
          node -v
          npm -v
          npx -v
          npm ls next || true
          npm ls @cloudflare/next-on-pages || true

      - name: Build do Next
        run: npm run build

      - name: Build Next para Cloudflare Pages (SSR)
        run: npx --yes @cloudflare/next-on-pages@latest --verbose

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=valparaisodegoiascamara --branch main
