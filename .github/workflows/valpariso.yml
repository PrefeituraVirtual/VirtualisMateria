name: Valparaíso

concurrency:
  group: valparaisodegoias
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - workflows_config

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"

      SKIP_PREFLIGHT_CHECK: "true"
      CI: "false"
      GENERATE_SOURCEMAP: "false"
      NEXT_PUBLIC_API_URL: "http://209.126.1.173"
      NEXT_PUBLIC_SITE_URL: "https://materiavalparaisodegoias.virtualis.ia.br"
      NEXT_PUBLIC_BUILD_MODE: "static"
      NEXT_PUBLIC_ENABLE_AI: "true"
      NEXT_PUBLIC_ENABLE_TRANSCRIPTION: "true"
      NEXT_PUBLIC_ENABLE_ADMIN: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalando dependências
        run: npm ci

      - name: Check TypeScript installed
        run: |
          npm ls typescript
          node -e "console.log(require('typescript').version)"

      - name: Ensure TypeScript present
        run: node -e "require.resolve('typescript')" 2>/dev/null || npm i -D typescript @types/node @types/react @types/react-dom

      - name: Debug build scripts (find next export)
        run: |
          node -e "const p=require('./package.json'); console.log('build=', p.scripts?.build); console.log('prebuild=', p.scripts?.prebuild); console.log('postbuild=', p.scripts?.postbuild); console.log('build:static=', p.scripts?.['build:static']);"
          grep -RIn "next export" package.json . || true

      - name: "Build static (Next output: export)"
        run: npm run build

      - name: Check output folder
        run: |
          test -d out
          ls -la out | head

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./out --project-name=materiavalparaisodegoias --branch main
