name: Valparaíso

concurrency:
  group: valparaisodegoias
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - workflows_config

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    env:
      SKIP_PREFLIGHT_CHECK: true
      CI: false
      GENERATE_SOURCEMAP: false
      NEXT_PUBLIC_API_URL=http://209.126.1.173
      NEXT_PUBLIC_SITE_URL=https://materiavalparaisodegoias.virtualis.ia.br
      NEXT_PUBLIC_BUILD_MODE=static
      NODE_ENV=production
      NEXT_PUBLIC_ENABLE_AI=true
      NEXT_PUBLIC_ENABLE_TRANSCRIPTION=true
      NEXT_PUBLIC_ENABLE_ADMIN=true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: yarn

      - name: Ativar Corepack (Yarn)
        run: corepack enable

      - name: Instalando as Dependências
        run: yarn install --frozen-lockfile

      - name: Ativando licença Syncfusion
        run: npx syncfusion-license activate

      - name: Gerando a build
        run: yarn build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=valparaisodegoiascamara --branch main
